name: CI & Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python tooling
        run: python -m pip install --upgrade pip pytest build

      - name: Run Python tests
        run: python -m pytest tests/ -q

      - name: Build Python package
        run: python -m build

  desktop-smoke:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install packaging tools
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build standalone converter
        run: pyinstaller logic2ableton.spec

      - name: Smoke test standalone converter
        run: .\dist\logic2ableton.exe --version

      - name: Copy converter binary to app resources
        run: Copy-Item dist\logic2ableton.exe app\resources\logic2ableton.exe -Force

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build app bundles
        working-directory: app
        run: npm run build

  build:
    needs: [test, desktop-smoke]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
            artifact_name: installer-win-x64
            converter_binary: dist/logic2ableton.exe
            smoke_command: .\dist\logic2ableton.exe --version
          - os: macos-14
            platform: mac
            arch: arm64
            artifact_name: installer-mac-arm64
            converter_binary: dist/logic2ableton
            smoke_command: ./dist/logic2ableton --version
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install packaging tools
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build standalone converter
        run: pyinstaller logic2ableton.spec

      - name: Smoke test standalone converter
        run: ${{ matrix.smoke_command }}

      - name: Copy converter binary to app resources
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win" ]; then
            cp dist/logic2ableton.exe app/resources/logic2ableton.exe
          else
            cp dist/logic2ableton app/resources/logic2ableton
          fi

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build app bundles
        working-directory: app
        run: npm run build

      - name: Generate macOS icon
        if: matrix.platform == 'mac'
        working-directory: app
        run: npm run prepare:mac-icon

      - name: Build Electron installer
        working-directory: app
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win" ]; then
            npx electron-builder --win --${{ matrix.arch }} --config electron-builder.yml
          else
            npx electron-builder --mac --${{ matrix.arch }} --config electron-builder.yml
          fi

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            app/dist/*.exe
            app/dist/*.dmg

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          merge-multiple: true
          path: release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
